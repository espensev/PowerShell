# GitHub Actions workflow — place in your PowerShell fork at:
#   .github/workflows/sync-upstream.yml
#
# Automatically syncs upstream Microsoft changes on a schedule.
# Creates a PR with upstream changes for review before merging.

name: Sync Upstream (Microsoft PowerShell)

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/PowerShell/PowerShell.git
          git fetch upstream master

      - name: Check if upstream has new commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commits ahead."

      - name: Create sync branch and merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git checkout -b "$BRANCH"

          if git merge upstream/master --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "chore: merge upstream (conflicts need manual resolution)" --no-verify || true
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEHIND: ${{ steps.check.outputs.behind }}
          BRANCH: ${{ steps.merge.outputs.branch }}
          CONFLICT: ${{ steps.merge.outputs.conflict }}
        run: |
          BODY="## Upstream Sync

          Merging **$BEHIND** new commits from [PowerShell/PowerShell](https://github.com/PowerShell/PowerShell).

          **Conflicts:** $( [ \"$CONFLICT\" = \"true\" ] && echo '⚠️ Yes — manual resolution required' || echo '✅ None' )

          ---
          *Auto-generated by sync-upstream workflow*"

          gh pr create \
            --title "chore: sync upstream PowerShell ($BEHIND commits)" \
            --body "$BODY" \
            --base master \
            --head "$BRANCH" \
            --label "upstream-sync"
